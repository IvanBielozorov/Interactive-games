<section class="section">
  <div class="container">
    <h2 class="title">Калькулятор</h2>
    <div class="calculator">
      <input class="calculator-1" placeholder="Число" />
      <ul class="operators">
        <li>
          <button class="plus">+</button>
        </li>
        <li>
          <button class="multiply">*</button>
        </li>
        <li>
          <button class="minus">-</button>
        </li>
        <li>
          <button class="divide">/</button>
        </li>
      </ul>

      <input class="calculator-2" placeholder="Число" />

      <button class="equals">=</button>

      <input class="result" placeholder="Результат" />
    </div>
  </div>
</section>
