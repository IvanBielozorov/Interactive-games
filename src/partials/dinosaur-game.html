<section class="dinosaur-game" id="6">
  <div class="dinosaur-game__wrap">
    <h3 class="dinosaur-game__title title">Google динозавр</h3>
    <canvas
      class="dinosaur-game__canvas"
      width="600px"
      height="200px"
      data-dinosaur-canvas
    ></canvas>
    <div class="dinosaur-game__box" data-dinosaur-start-box>
      <p class="dinosaur-game-box__title">Гру завершено!</p>
      <button class="dinosaur-game-again__btn" data-dinosaur-again>
        Спробувати ще
      </button>
    </div>
    <button class="dinosaur-game-start__btn" data-dinosaur-start>
      Почати гру
    </button>
    <img
      style="display: none"
      src="./images/dinosaur/dino.png"
      data-dino-start
    />
    <img
      style="display: none"
      src="./images/dinosaur/dino-dead.png"
      data-dino-end
    />
    <img style="display: none" src="./images/dinosaur/cactus.png" data-cactus />
  </div>
</section>
